*{box-sizing:border-box}:root{--bg1:#082147;--bg2:#041225;--panel:rgba(8,29,58,.88);--panel-border:rgba(214,233,255,.18);--line:rgba(228,240,255,.92);--muted:#a9bfda;--accent:#dff0ff;--shadow:0 18px 40px rgba(0,0,0,.25)}html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;color:var(--line);background:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(180deg,var(--bg1),var(--bg2) 70%);background-size:24px 24px,24px 24px,cover}.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}.sidebar{background:rgba(3,15,31,.75);border-right:1px solid rgba(223,240,255,.14);padding:24px 16px;position:sticky;top:0;height:100vh;overflow-y:auto}.eyebrow{margin:0 0 6px;text-transform:uppercase;letter-spacing:.14em;font-size:.72rem;color:var(--muted)}h1,h2,h3,h4{margin-top:0}h1{font-size:1.9rem;margin-bottom:10px}.copy,.muted,li,p{color:var(--muted);line-height:1.55}.lab-list{display:grid;gap:10px;margin-top:18px}.lab-tile{text-align:left;border:1px solid rgba(223,240,255,.12);background:rgba(255,255,255,.03);color:var(--line);border-radius:16px;padding:14px;display:grid;gap:4px;cursor:pointer;width:100%}.lab-tile.selected{border-color:rgba(223,240,255,.42);background:rgba(223,240,255,.08)}.lab-title{font-size:.98rem;font-weight:600;color:var(--line)}main{padding:24px}.card{position:relative;overflow:hidden;border-radius:24px;border:1px solid var(--panel-border);background:var(--panel);box-shadow:var(--shadow);margin-bottom:18px}.hero{min-height:220px}.card-inner{position:relative;z-index:2;padding:28px}.hero h2{font-size:clamp(2rem,4vw,3.2rem);margin-bottom:10px}.pill,.tag,.btn{display:inline-flex;align-items:center;border:1px solid rgba(223,240,255,.22);background:rgba(223,240,255,.08);padding:8px 12px;border-radius:999px;color:var(--accent);font-size:.86rem}.row{display:flex;gap:10px;flex-wrap:wrap}.grid{display:grid;gap:18px;margin-bottom:18px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.panel{padding:22px}ul,ol{padding-left:20px;margin-bottom:0}.blueprint-grid{position:absolute;inset:0;z-index:1;opacity:.5;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:24px 24px,24px 24px,96px 96px,96px 96px}.step-flow{display:grid;gap:14px}.step-card,.question,.diagram-box,.mini-box{border:1px solid rgba(223,240,255,.16);border-radius:18px;padding:16px;background:rgba(255,255,255,.025)}.step-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}.step-index{font-size:.8rem;letter-spacing:.12em;color:var(--accent)}.rule{height:1px;background:rgba(223,240,255,.18);flex:1}.subtitle{color:var(--accent);font-size:.92rem;margin:0 0 8px}.question p:first-child{color:var(--accent);font-weight:700}.options{display:grid;gap:8px}.option{display:flex;gap:10px;align-items:flex-start}.feedback{margin-top:12px;padding:12px 14px;border-radius:14px;font-size:.95rem}.correct{background:rgba(107,255,175,.08);border:1px solid rgba(107,255,175,.16)}.incorrect{background:rgba(255,169,169,.08);border:1px solid rgba(255,169,169,.16)}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button.btn{cursor:pointer;color:var(--line)}.score{margin-top:12px;display:inline-flex;padding:12px 14px;border-radius:14px;background:rgba(223,240,255,.08);border:1px solid rgba(223,240,255,.18);color:var(--accent);font-weight:600}.microscope-svg,.cell-svg{width:100%;max-width:520px;height:auto;display:block;margin:0 auto}.label-list{columns:2;gap:24px}.label-list li{break-inside:avoid;margin-bottom:8px}.small-note{font-size:.9rem}.compare-grid,.safety-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.compare-box{border:1px solid rgba(223,240,255,.16);border-radius:18px;padding:14px;background:rgba(255,255,255,.025)}.ph-scale{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.ph-segment{border:1px solid rgba(223,240,255,.16);border-radius:16px;padding:14px;text-align:center;background:rgba(255,255,255,.025);color:var(--accent);font-weight:700}.ph-segment span{display:block;font-weight:400;color:var(--muted);margin-top:6px}@media (max-width:1100px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid rgba(223,240,255,.14)}.grid.two,.grid.three,.compare-grid,.safety-grid,.ph-scale{grid-template-columns:1fr}.label-list{columns:1}}
</style></head><body><div class='app'><aside class='sidebar'><p class='eyebrow'>BIOL 1110</p><h1>Lab Blueprint</h1><p class='copy'>Single-file blueprint companion with full lab modules, quick checks, and manual alignment.</p><div id='labList' class='lab-list'></div></aside><main><div id='content'></div></main></div><script>
const labs=[{"id": 1, "title": "Introduction to Course Syllabus & Lab Safety", "hero": "Lab orientation, safety expectations, and course setup support.", "manual_do": ["Review the syllabus and lab expectations.", "Learn core lab safety rules and procedures.", "Identify proper PPE and emergency response steps.", "Complete any course setup items tied to the lab."], "blueprint_understand": ["Connect lab rules to safe scientific practice.", "Recognize unsafe versus safe behaviors.", "Identify core documentation and participation expectations.", "Understand how safety supports successful lab work."], "lab_check": ["Identify correct lab safety practices.", "Explain why PPE and documentation matter.", "Show readiness for future in-person lab work."], "study_title": "Safety Blueprint", "study_tag": "Protocol Plate", "study_html": "<div class='safety-grid'><div class='mini-box'><h4>PPE</h4><p>Goggles, gloves, proper clothing, and closed-toe shoes when required.</p></div><div class='mini-box'><h4>Behavior</h4><p>No horseplay, no unauthorized procedures, and follow instructions carefully.</p></div><div class='mini-box'><h4>Reporting</h4><p>Report spills, injuries, broken glass, or unsafe conditions immediately.</p></div><div class='mini-box'><h4>Documentation</h4><p>Record observations clearly and keep materials organized.</p></div></div>", "reference_title": "Safety Focus", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>PPE:</strong> Protects the student and supports safe technique.</li><li><strong>Instructions:</strong> Procedures should be followed exactly as assigned.</li><li><strong>Reporting:</strong> Problems should be communicated right away.</li><li><strong>Documentation:</strong> Accurate records help support observations and learning.</li><li><strong>Preparedness:</strong> Being ready for lab supports both safety and participation.</li></ul>", "questions": [{"prompt": "Why is PPE important in lab?", "options": ["It replaces safe behavior", "It helps protect the student during lab work", "It improves magnification", "It guarantees correct results"], "correct": 1, "explanation": "PPE helps reduce risk and protect students during laboratory work."}, {"prompt": "What should a student do if an accident or spill occurs?", "options": ["Ignore it", "Wait until class ends", "Report it immediately", "Hide the evidence"], "correct": 2, "explanation": "Accidents and spills should be reported immediately so they can be handled safely."}, {"prompt": "Why does documentation matter in lab?", "options": ["It is unrelated to science", "It supports clear, organized recording of observations", "It replaces participation", "It is only for the instructor"], "correct": 1, "explanation": "Good documentation supports accurate observations and helps students think scientifically."}, {"prompt": "Which behavior best supports safe lab work?", "options": ["Horseplay", "Ignoring directions", "Following procedures carefully", "Using equipment without instruction"], "correct": 2, "explanation": "Safe lab work depends on careful attention to directions and proper procedure."}], "manual_alignment": ["Safety rules in the manual connect directly to the safety blueprint boxes.", "Participation expectations are reinforced through the module.", "This module supports the first-day transition into hands-on lab work."], "instructor_notes": ["This is a strong opening module because it connects policy to practice.", "Later, it could become a clickable safety-scenario activity."]}, {"id": 2, "title": "Scientific Method", "hero": "Pillbug behavior lab companion that ties the purchased lab manual to a blueprint-style concept review.", "manual_do": ["Observe pillbug motion and behavior.", "Measure speed for three pillbugs.", "Record hypotheses in the manual tables.", "Complete conclusion and review questions."], "blueprint_understand": ["Identify independent and dependent variables.", "Explain the role of controls.", "Interpret attraction, repulsion, or no response.", "Connect data to hypothesis and conclusion."], "lab_check": ["Define hypothesis vs. conclusion.", "Identify the control and explain why it matters.", "State independent and dependent variables.", "Use observations to explain one response."], "study_title": "Scientific Method Blueprint", "study_tag": "Study Plate", "study_html": "<div class='step-flow'><div class='step-card'><div class='step-top'><span class='step-index'>01</span><span class='rule'></span></div><h4>Observation</h4><p class='subtitle'>What students do in the manual</p><p>Observe pillbug movement and behavior before testing anything.</p></div><div class='step-card'><div class='step-top'><span class='step-index'>02</span><span class='rule'></span></div><h4>Measurement</h4><p class='subtitle'>Collect basic data</p><p>Measure the speed of three pillbugs and calculate average speed in cm/sec.</p></div><div class='step-card'><div class='step-top'><span class='step-index'>03</span><span class='rule'></span></div><h4>Hypothesis</h4><p class='subtitle'>Predict the outcome</p><p>Choose dry and wet substances, include controls, and predict +, \u2212, or 0.</p></div><div class='step-card'><div class='step-top'><span class='step-index'>04</span><span class='rule'></span></div><h4>Experiment</h4><p class='subtitle'>Test one substance at a time</p><p>Rinse and dry the pillbug between trials, then record each response carefully.</p></div><div class='step-card'><div class='step-top'><span class='step-index'>05</span><span class='rule'></span></div><h4>Conclusion</h4><p class='subtitle'>Interpret the results</p><p>Decide whether the hypothesis was supported and explain how controls affect the conclusion.</p></div></div>", "reference_title": "Manual Alignment", "reference_tag": "Reference", "reference_html": "<ul><li>Observation: pillbug motion and body features</li><li>Measurement: speed, time, and average speed</li><li>Hypothesis tables with dry and wet controls</li><li>Experimental response tables and conclusion questions</li><li>Laboratory review items on control, data, theory, and conclusion</li></ul>", "questions": [{"prompt": "What is the main role of a control in the pillbug experiment?", "options": ["To make the pillbug move faster", "To provide a comparison so the tested substance can be evaluated", "To guarantee the hypothesis is correct", "To replace the need for repeated trials"], "correct": 1, "explanation": "A control provides a baseline for comparison so students can judge whether the pillbug responded differently to a tested substance."}, {"prompt": "In this lab, the substance being tested is the:", "options": ["Dependent variable", "Control variable", "Independent variable", "Conclusion"], "correct": 2, "explanation": "The independent variable is the factor being changed or tested."}, {"prompt": "The pillbug's observed response (+, \u2212, or 0) is the:", "options": ["Dependent variable", "Independent variable", "Theory", "Control"], "correct": 0, "explanation": "The response is the measured result, so it is the dependent variable."}, {"prompt": "A hypothesis is best described as:", "options": ["A summary after the experiment", "A prediction that can be tested", "A final proof", "A source of random error"], "correct": 1, "explanation": "A hypothesis is a testable prediction."}], "manual_alignment": ["The module mirrors the logic students use in the manual.", "It supports lab checks without replacing worksheet completion."], "instructor_notes": ["This module works well in class while students complete the pillbug activity."]}, {"id": 3, "title": "Understanding Biochemical Tests", "hero": "Blueprint support for pH, acids, bases, and buffers.", "manual_do": ["Observe pH scale examples and indicator changes.", "Compare acidic, basic, and neutral substances.", "Record buffer behavior and results in the manual.", "Complete analysis questions about pH change."], "blueprint_understand": ["Connect pH values to acidic or basic conditions.", "Interpret indicator color changes.", "Understand how buffers resist sudden pH change.", "Apply the concept of scale and relative change."], "lab_check": ["Classify acidic, basic, and neutral samples.", "Explain the role of a buffer.", "Interpret a pH-related observation."], "study_title": "pH Blueprint", "study_tag": "Concept Plate", "study_html": "<div class='ph-scale'><div class='ph-segment'>0\u20133<br><span>Strong Acid</span></div><div class='ph-segment'>4\u20136<br><span>Weak Acid</span></div><div class='ph-segment'>7<br><span>Neutral</span></div><div class='ph-segment'>8\u201310<br><span>Weak Base</span></div><div class='ph-segment'>11\u201314<br><span>Strong Base</span></div></div><p class='small-note'>Use this plate beside the lab manual when comparing indicators and buffer responses.</p>", "reference_title": "Key Ideas", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Acid:</strong> Has a pH below 7.</li><li><strong>Base:</strong> Has a pH above 7.</li><li><strong>Neutral:</strong> Has a pH of 7.</li><li><strong>Buffer:</strong> Resists major pH change when acid or base is added.</li><li><strong>Indicator:</strong> Changes color to help reveal pH range.</li></ul>", "questions": [{"prompt": "A solution with a pH of 3 is best classified as:", "options": ["Neutral", "Acidic", "Basic", "Buffered"], "correct": 1, "explanation": "A pH of 3 is acidic."}, {"prompt": "A buffer is important because it:", "options": ["Makes every solution neutral", "Resists sudden pH changes", "Eliminates indicators", "Always lowers pH"], "correct": 1, "explanation": "Buffers help resist major pH changes."}, {"prompt": "A pH of 7 is considered:", "options": ["Strong acid", "Weak base", "Neutral", "Strong base"], "correct": 2, "explanation": "A pH of 7 is neutral."}, {"prompt": "Indicators are useful because they:", "options": ["Measure mass", "Show color changes related to pH", "Replace buffers", "Always identify exact molecules"], "correct": 1, "explanation": "Indicators provide a visible color change linked to pH."}], "manual_alignment": ["The pH scale plate supports interpretation of manual data.", "The buffer concept ties directly to supplement questions."], "instructor_notes": ["This module can later include a draggable pH classification activity."]}, {"id": 4, "title": "Microscopy", "hero": "Blueprint-style microscope module that supports in-class manual work, structure identification, and microscopy check questions.", "manual_do": ["Identify microscope parts.", "Practice carrying, focusing, and slide placement.", "Move from low power to higher magnification.", "Record observations using the lab manual."], "blueprint_understand": ["Learn the function of each microscope part.", "Connect objective changes to total magnification.", "Understand when to use coarse vs. fine focus.", "Recognize how light and diaphragm settings affect the image."], "lab_check": ["Calculate total magnification.", "Identify the correct focusing knob for a situation.", "Explain the role of the diaphragm.", "Show readiness for microscope-based lab tests."], "study_title": "Microscope Blueprint Study", "study_tag": "Structure Plate", "study_html": "<div class='diagram-box'><svg class='microscope-svg' viewBox='0 0 520 520' fill='none' xmlns='http://www.w3.org/2000/svg'><g stroke='#E4F0FF' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><rect x='145' y='432' width='230' height='24' rx='4'/><path d='M205 432L240 380H330L355 432'/><rect x='230' y='290' width='120' height='18' rx='3'/><path d='M290 308V380'/><path d='M210 365C210 310 240 250 300 220'/><path d='M235 352C235 308 258 268 305 242'/><circle cx='214' cy='333' r='26'/><circle cx='214' cy='333' r='10'/><circle cx='248' cy='286' r='12'/><path d='M300 220L344 160'/><rect x='334' y='112' width='24' height='70' rx='4' transform='rotate(18 334 112)'/><circle cx='306' cy='226' r='20'/><path d='M306 246L290 290'/><path d='M306 246L312 290'/><path d='M306 246L334 286'/><path d='M350 293V344'/><path d='M372 278L372 359'/><path d='M230 299L196 299'/><path d='M360 299L402 299'/></g><g fill='#E4F0FF' font-family='Arial' font-size='12'><text x='366' y='108'>Eyepiece</text><text x='354' y='192'>Body Tube</text><text x='334' y='218'>Revolving</text><text x='334' y='232'>Nosepiece</text><text x='360' y='286'>Objectives</text><text x='196' y='276'>Stage</text><text x='140' y='325'>Coarse</text><text x='140' y='339'>Focus</text><text x='182' y='280'>Fine Focus</text><text x='250' y='398'>Arm</text><text x='245' y='451'>Base</text></g></svg></div><p class='small-note'>Use this beside the manual to connect part names to function.</p>", "reference_title": "Key Parts and Functions", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Eyepiece (ocular):</strong> The lens students look through, commonly 10x.</li><li><strong>Body tube:</strong> Holds the optical path between ocular and objectives.</li><li><strong>Revolving nosepiece:</strong> Rotates to change objective lenses.</li><li><strong>Objective lenses:</strong> Provide different magnification levels.</li><li><strong>Stage:</strong> Supports the slide.</li><li><strong>Coarse adjustment:</strong> Used first on low power for general focus.</li><li><strong>Fine adjustment:</strong> Used for precise focus, especially on higher power.</li><li><strong>Diaphragm:</strong> Controls light passing through the specimen.</li><li><strong>Arm:</strong> Supports the upper microscope structure.</li><li><strong>Base:</strong> Stabilizes the instrument.</li></ul>", "questions": [{"prompt": "What is the total magnification when using a 10x ocular lens and a 40x objective lens?", "options": ["40x", "100x", "400x", "1000x"], "correct": 2, "explanation": "Total magnification is ocular magnification multiplied by objective magnification: 10 \u00d7 40 = 400."}, {"prompt": "Which knob should be used first to bring a specimen into general focus on low power?", "options": ["Fine adjustment knob", "Coarse adjustment knob", "Diaphragm lever", "Revolving nosepiece"], "correct": 1, "explanation": "The coarse adjustment knob is used first on low power to bring the specimen into general focus."}, {"prompt": "Why should only the fine adjustment knob be used on high power?", "options": ["It increases the brightness", "It changes the slide orientation", "It reduces the risk of crashing the objective into the slide", "It changes the total magnification"], "correct": 2, "explanation": "The fine adjustment knob allows small focus changes and helps prevent damage to the slide or objective lens."}, {"prompt": "What is the main function of the diaphragm?", "options": ["To rotate objectives", "To control the amount of light passing through the specimen", "To move the stage up and down", "To change the magnification"], "correct": 1, "explanation": "The diaphragm regulates how much light reaches the specimen."}], "manual_alignment": ["Microscope parts and handling tie directly to the labeled blueprint diagram.", "Magnification sections in the manual link to the total magnification check.", "Focusing technique connects to coarse vs. fine adjustment questions."], "instructor_notes": ["Later, this can become a click-to-label exercise.", "This aligns well with lab practical questions."]}, {"id": 5, "title": "Chemical Composition of Cells", "hero": "Blueprint module for proteins, carbohydrates, and lipids.", "manual_do": ["Perform or interpret tests for major biomolecules.", "Observe indicator changes tied to different macromolecules.", "Record results in the lab manual.", "Compare which samples test positive for each category."], "blueprint_understand": ["Connect test results to biomolecule categories.", "Differentiate proteins, carbohydrates, and lipids.", "Link structure categories to biological function.", "Recognize patterns in positive and negative results."], "lab_check": ["Identify which test matches which biomolecule.", "Interpret indicator results.", "Connect a biomolecule to a basic function."], "study_title": "Macromolecule Blueprint", "study_tag": "Comparison Plate", "study_html": "<div class='compare-grid'><div class='compare-box'><h4>Carbohydrates</h4><p>Energy source and short-term storage.</p></div><div class='compare-box'><h4>Proteins</h4><p>Structure, enzymes, transport, and signaling.</p></div><div class='compare-box'><h4>Lipids</h4><p>Long-term energy storage and membrane structure.</p></div><div class='compare-box'><h4>Test Logic</h4><p>Indicator changes help identify sample composition.</p></div></div>", "reference_title": "Core Concepts", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Carbohydrates:</strong> Often serve as energy sources.</li><li><strong>Proteins:</strong> Perform structural and functional roles in cells.</li><li><strong>Lipids:</strong> Important in membranes and energy storage.</li><li><strong>Indicators:</strong> Help identify the presence of biomolecules.</li></ul>", "questions": [{"prompt": "Which macromolecule is most closely associated with membrane structure?", "options": ["Carbohydrates", "Lipids", "Nucleic acids", "Minerals"], "correct": 1, "explanation": "Lipids are major components of cell membranes."}, {"prompt": "Proteins are especially important because they:", "options": ["Only store water", "Only store DNA", "Can function as enzymes and structural components", "Only form cell walls"], "correct": 2, "explanation": "Proteins have many roles, including enzyme action and structure."}, {"prompt": "Carbohydrates are commonly linked to:", "options": ["Short-term energy", "DNA replication only", "Cell division only", "Waste removal"], "correct": 0, "explanation": "Carbohydrates are commonly associated with short-term energy."}, {"prompt": "Indicator tests are useful because they:", "options": ["Replace lab observations", "Help reveal which biomolecules are present", "Always identify exact concentrations", "Remove the need for controls"], "correct": 1, "explanation": "Indicators help show whether a biomolecule category is present."}], "manual_alignment": ["The module supports interpretation of positive and negative biochemical results."], "instructor_notes": ["This could later include a match-the-test activity."]}, {"id": 6, "title": "Cell Structure and Function", "hero": "Blueprint-style cell module for comparing plant and animal cells, linking organelle structure to function, and reinforcing manual observations.", "manual_do": ["Observe prepared slides or diagrams of plant and animal cells.", "Identify major cell structures in the manual.", "Record observations and comparisons.", "Use evidence from the lab to describe cell function."], "blueprint_understand": ["Connect organelle names to their functions.", "Compare plant and animal cell structures.", "Recognize what all cells share versus what is unique.", "Reinforce vocabulary needed for lab tests."], "lab_check": ["Identify plant-only versus shared structures.", "Explain major organelle functions.", "Compare plant and animal cells clearly.", "Show readiness for cell structure test questions."], "study_title": "Cell Blueprint Study", "study_tag": "Comparison Plate", "study_html": "<div class='diagram-box'><svg class='cell-svg' viewBox='0 0 620 360' fill='none' xmlns='http://www.w3.org/2000/svg'><g stroke='#E4F0FF' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><rect x='36' y='36' width='244' height='244' rx='18'/><rect x='54' y='54' width='208' height='208' rx='28'/><circle cx='142' cy='132' r='34'/><ellipse cx='212' cy='126' rx='24' ry='16'/><ellipse cx='98' cy='208' rx='28' ry='16'/><rect x='160' y='180' width='64' height='46' rx='6'/><ellipse cx='222' cy='214' rx='16' ry='10'/><ellipse cx='462' cy='158' rx='118' ry='92'/><ellipse cx='462' cy='158' rx='100' ry='76'/><circle cx='426' cy='134' r='32'/><ellipse cx='512' cy='132' rx='22' ry='15'/><ellipse cx='506' cy='200' rx='26' ry='16'/><ellipse cx='406' cy='206' rx='22' ry='14'/></g><g fill='#E4F0FF' font-family='Arial' font-size='12'><text x='88' y='24'>Plant Cell Study</text><text x='406' y='24'>Animal Cell Study</text><text x='120' y='136'>Nucleus</text><text x='170' y='174'>Central</text><text x='170' y='188'>Vacuole</text><text x='62' y='74'>Cell Wall</text><text x='70' y='98'>Cell Membrane</text><text x='204' y='118'>Chloroplast</text><text x='72' y='228'>Mitochondrion</text><text x='228' y='228'>Golgi</text><text x='404' y='138'>Nucleus</text><text x='500' y='128'>Mitochondrion</text><text x='496' y='222'>Golgi</text><text x='382' y='226'>Lysosome</text><text x='356' y='98'>Cell Membrane</text></g></svg></div>", "reference_title": "Compare the Cells", "reference_tag": "Reference", "reference_html": "<div class='compare-grid'><div class='compare-box'><h4>Plant Cell</h4><ul><li>Cell wall</li><li>Cell membrane</li><li>Nucleus</li><li>Chloroplasts</li><li>Large central vacuole</li><li>Mitochondria</li></ul></div><div class='compare-box'><h4>Animal Cell</h4><ul><li>Cell membrane</li><li>Nucleus</li><li>Mitochondria</li><li>Golgi apparatus</li><li>Lysosomes</li><li>No cell wall or chloroplasts</li></ul></div></div><h3 style='margin-top:22px;'>Organelle Function Highlights</h3><ul class='label-list'><li><strong>Nucleus:</strong> Stores DNA and directs cell activities.</li><li><strong>Cell membrane:</strong> Controls what enters and leaves the cell.</li><li><strong>Cell wall:</strong> Provides support and protection in plant cells.</li><li><strong>Chloroplast:</strong> Site of photosynthesis in plant cells.</li><li><strong>Central vacuole:</strong> Stores water and helps maintain plant cell rigidity.</li><li><strong>Mitochondrion:</strong> Produces ATP through cellular respiration.</li><li><strong>Golgi apparatus:</strong> Modifies and packages materials.</li><li><strong>Lysosome:</strong> Breaks down waste and worn-out components.</li></ul>", "questions": [{"prompt": "Which structure is found in plant cells but not animal cells?", "options": ["Mitochondrion", "Cell wall", "Cell membrane", "Ribosome"], "correct": 1, "explanation": "Plant cells have a cell wall, while animal cells do not."}, {"prompt": "What is the main function of the nucleus?", "options": ["Produce ATP", "Store genetic information and direct cell activities", "Digest worn-out organelles", "Control water loss"], "correct": 1, "explanation": "The nucleus houses DNA and helps direct cell activities."}, {"prompt": "Which organelle is the primary site of ATP production?", "options": ["Golgi apparatus", "Central vacuole", "Mitochondrion", "Lysosome"], "correct": 2, "explanation": "Mitochondria are the main organelles responsible for ATP production in eukaryotic cells."}, {"prompt": "What is the key function of the cell membrane?", "options": ["Provide rigid structural support like a cell wall", "Control what enters and leaves the cell", "Store genetic material", "Produce proteins"], "correct": 1, "explanation": "The cell membrane regulates movement into and out of the cell."}], "manual_alignment": ["Plant and animal cell observations link directly to the comparison plate.", "Cell structure vocabulary is reinforced through the quick check."], "instructor_notes": ["This is a strong follow-up to microscopy.", "Later, this can become a click-to-label activity."]}, {"id": 7, "title": "Diffusion and Osmosis", "hero": "Blueprint support for membrane transport and tonicity.", "manual_do": ["Observe movement of water or solute across a membrane model.", "Record changes in mass, volume, or appearance.", "Compare isotonic, hypotonic, and hypertonic conditions.", "Answer application questions in the manual."], "blueprint_understand": ["Distinguish diffusion from osmosis.", "Interpret concentration gradients.", "Predict movement of water across membranes.", "Connect tonicity to observed results."], "lab_check": ["Define diffusion and osmosis.", "Identify solution type from a scenario.", "Predict water movement."], "study_title": "Transport Blueprint", "study_tag": "Process Plate", "study_html": "<div class='compare-grid'><div class='compare-box'><h4>Diffusion</h4><p>Movement of particles from higher to lower concentration.</p></div><div class='compare-box'><h4>Osmosis</h4><p>Movement of water across a selectively permeable membrane.</p></div><div class='compare-box'><h4>Hypotonic</h4><p>Water tends to move into the cell.</p></div><div class='compare-box'><h4>Hypertonic</h4><p>Water tends to move out of the cell.</p></div></div>", "reference_title": "Key Terms", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Diffusion:</strong> Movement down a concentration gradient.</li><li><strong>Osmosis:</strong> Diffusion of water across a membrane.</li><li><strong>Isotonic:</strong> No net water movement.</li><li><strong>Hypotonic:</strong> Water tends to enter the cell.</li><li><strong>Hypertonic:</strong> Water tends to leave the cell.</li></ul>", "questions": [{"prompt": "Osmosis specifically refers to the movement of:", "options": ["Proteins", "Water", "ATP", "DNA"], "correct": 1, "explanation": "Osmosis is the movement of water across a selectively permeable membrane."}, {"prompt": "In a hypertonic solution, water tends to:", "options": ["Move into the cell", "Move out of the cell", "Stop moving entirely", "Break the membrane"], "correct": 1, "explanation": "In a hypertonic environment, water tends to move out of the cell."}, {"prompt": "Diffusion moves particles from:", "options": ["Low concentration to high concentration", "Higher concentration to lower concentration", "Membrane to nucleus", "Outside the lab to inside the lab"], "correct": 1, "explanation": "Diffusion moves particles down the concentration gradient."}, {"prompt": "An isotonic condition means:", "options": ["No net water movement", "Only water enters the cell", "Only water leaves the cell", "The membrane is destroyed"], "correct": 0, "explanation": "Isotonic means no net water movement across the membrane."}], "manual_alignment": ["The module supports interpretation of transport results in the manual."], "instructor_notes": ["Later, this could become a simple movement simulation."]}, {"id": 8, "title": "How Enzymes Function", "hero": "Blueprint support for enzyme-substrate interactions and factors affecting enzyme activity.", "manual_do": ["Observe enzyme reactions under different conditions.", "Compare outcomes at different temperatures, pH values, or substrate conditions.", "Record observations and trends.", "Interpret why activity changes."], "blueprint_understand": ["Connect enzymes to reaction rate.", "Recognize enzyme-substrate specificity.", "Understand how temperature and pH affect activity.", "Distinguish optimal conditions from denaturation."], "lab_check": ["Identify factors that influence enzyme activity.", "Interpret a basic enzyme scenario.", "Connect structure to function."], "study_title": "Enzyme Blueprint", "study_tag": "Reaction Plate", "study_html": "<div class='compare-grid'><div class='compare-box'><h4>Substrate</h4><p>The molecule the enzyme acts on.</p></div><div class='compare-box'><h4>Active Site</h4><p>The region where substrate binding occurs.</p></div><div class='compare-box'><h4>Optimal Conditions</h4><p>Conditions where the enzyme works best.</p></div><div class='compare-box'><h4>Denaturation</h4><p>Loss of enzyme shape and function under extreme conditions.</p></div></div>", "reference_title": "Key Concepts", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Enzyme:</strong> Biological catalyst that speeds reactions.</li><li><strong>Substrate:</strong> Reactant that binds the enzyme.</li><li><strong>Temperature:</strong> Can increase rate up to an optimum, then reduce activity if too high.</li><li><strong>pH:</strong> Extreme pH can reduce enzyme function.</li></ul>", "questions": [{"prompt": "An enzyme is best described as a:", "options": ["Storage molecule", "Biological catalyst", "Type of membrane", "Genetic code"], "correct": 1, "explanation": "Enzymes are biological catalysts."}, {"prompt": "The substrate is:", "options": ["The product only", "The molecule the enzyme acts on", "The active site", "The pH scale"], "correct": 1, "explanation": "The substrate is the molecule acted on by the enzyme."}, {"prompt": "If temperature becomes too high, enzyme activity may drop because:", "options": ["The enzyme may denature", "The substrate disappears instantly", "ATP stops existing", "The active site becomes larger"], "correct": 0, "explanation": "Excess heat can denature an enzyme and reduce activity."}, {"prompt": "Enzymes are important because they:", "options": ["Stop all reactions", "Slow down ATP production", "Speed up chemical reactions", "Replace cells"], "correct": 2, "explanation": "Enzymes speed up chemical reactions."}], "manual_alignment": ["This supports interpretation of reaction changes seen in lab."], "instructor_notes": ["Later, this could include a slider-style activity for temperature and pH."]}, {"id": 9, "title": "Aerobic Cellular Respiration", "hero": "Blueprint module for cellular respiration and ATP production.", "manual_do": ["Observe or analyze evidence of aerobic respiration.", "Record changes tied to respiration activity.", "Interpret how cells generate usable energy.", "Complete analysis questions in the manual."], "blueprint_understand": ["Connect respiration to ATP production.", "Recognize inputs and outputs of aerobic respiration.", "Understand the role of mitochondria.", "Differentiate energy release from photosynthesis."], "lab_check": ["Identify the main organelle involved.", "Recognize major inputs and outputs.", "Explain the purpose of cellular respiration."], "study_title": "Respiration Blueprint", "study_tag": "Energy Plate", "study_html": "<div class='compare-grid'><div class='compare-box'><h4>Inputs</h4><p>Glucose and oxygen</p></div><div class='compare-box'><h4>Outputs</h4><p>Carbon dioxide, water, and ATP</p></div><div class='compare-box'><h4>Main Organelle</h4><p>Mitochondrion</p></div><div class='compare-box'><h4>Main Role</h4><p>Release usable energy for the cell</p></div></div>", "reference_title": "Key Concepts", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Cellular respiration:</strong> Process cells use to release energy from glucose.</li><li><strong>Mitochondrion:</strong> Main organelle associated with ATP production.</li><li><strong>ATP:</strong> Usable energy currency of the cell.</li><li><strong>Oxygen:</strong> Important reactant in aerobic respiration.</li></ul>", "questions": [{"prompt": "The main organelle associated with aerobic respiration is the:", "options": ["Chloroplast", "Mitochondrion", "Nucleus", "Ribosome"], "correct": 1, "explanation": "The mitochondrion is strongly associated with aerobic cellular respiration."}, {"prompt": "A major purpose of cellular respiration is to produce:", "options": ["DNA", "ATP", "Cell wall", "Chlorophyll"], "correct": 1, "explanation": "Cellular respiration helps produce ATP for the cell."}, {"prompt": "Which of the following is an input of aerobic respiration?", "options": ["Oxygen", "Carbon dioxide only", "Protein", "Cell wall"], "correct": 0, "explanation": "Oxygen is one of the key inputs of aerobic respiration."}, {"prompt": "Which is a major output of aerobic respiration?", "options": ["Chlorophyll", "Carbon dioxide", "Cell membrane", "Nucleus"], "correct": 1, "explanation": "Carbon dioxide is a major output of aerobic respiration."}], "manual_alignment": ["This supports manual observations tied to respiration evidence."], "instructor_notes": ["Later, this could connect visually to the mitochondrion from Lab 6."]}, {"id": 10, "title": "Photosynthesis", "hero": "Blueprint module for photosynthesis and chloroplast function.", "manual_do": ["Observe evidence tied to photosynthesis.", "Record outcomes related to light and plant function.", "Interpret how energy is captured and stored.", "Complete analysis questions in the manual."], "blueprint_understand": ["Connect chloroplasts to photosynthesis.", "Recognize major inputs and outputs.", "Compare photosynthesis with respiration.", "Link light energy to sugar production."], "lab_check": ["Identify the organelle for photosynthesis.", "Recognize major inputs and outputs.", "Explain why photosynthesis matters."], "study_title": "Photosynthesis Blueprint", "study_tag": "Energy Plate", "study_html": "<div class='compare-grid'><div class='compare-box'><h4>Inputs</h4><p>Carbon dioxide, water, and light</p></div><div class='compare-box'><h4>Outputs</h4><p>Glucose and oxygen</p></div><div class='compare-box'><h4>Main Organelle</h4><p>Chloroplast</p></div><div class='compare-box'><h4>Main Role</h4><p>Capture light energy to build sugars</p></div></div>", "reference_title": "Key Concepts", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Photosynthesis:</strong> Process used by plants to convert light energy into stored chemical energy.</li><li><strong>Chloroplast:</strong> Organelle where photosynthesis occurs.</li><li><strong>Glucose:</strong> Energy-rich product of photosynthesis.</li><li><strong>Oxygen:</strong> Important product released during photosynthesis.</li></ul>", "questions": [{"prompt": "Photosynthesis primarily occurs in the:", "options": ["Mitochondrion", "Chloroplast", "Golgi apparatus", "Lysosome"], "correct": 1, "explanation": "Photosynthesis occurs in chloroplasts."}, {"prompt": "Which of the following is a major input of photosynthesis?", "options": ["Oxygen only", "Carbon dioxide", "ATP only", "Protein"], "correct": 1, "explanation": "Carbon dioxide is a major input of photosynthesis."}, {"prompt": "A major product of photosynthesis is:", "options": ["Glucose", "DNA", "Cell wall", "Nitrogen gas"], "correct": 0, "explanation": "Glucose is a major product of photosynthesis."}, {"prompt": "Photosynthesis is important because it:", "options": ["Breaks down ATP", "Captures light energy and stores it in sugars", "Destroys chloroplasts", "Eliminates respiration"], "correct": 1, "explanation": "Photosynthesis stores energy in sugar molecules."}], "manual_alignment": ["This supports interpretation of photosynthesis evidence in the manual."], "instructor_notes": ["Later, this can visually pair with the chloroplast from Lab 6."]}, {"id": 11, "title": "Mitosis", "hero": "Blueprint module for ordering mitotic stages and interpreting chromosome behavior.", "manual_do": ["Observe mitotic stages on prepared slides or images.", "Identify differences among stages.", "Record observations in sequence.", "Use the manual to compare chromosome behavior."], "blueprint_understand": ["Order the stages of mitosis.", "Recognize chromosome movement at each stage.", "Differentiate mitosis from cytokinesis.", "Connect mitosis to growth and repair."], "lab_check": ["Identify stages of mitosis.", "Explain what happens to chromosomes in key phases.", "Connect mitosis to biological function."], "study_title": "Mitosis Blueprint", "study_tag": "Sequence Plate", "study_html": "<div class='step-flow'><div class='step-card'><div class='step-top'><span class='step-index'>01</span><span class='rule'></span></div><h4>Prophase</h4><p class='subtitle'>Chromosomes condense</p><p>Chromatin condenses and spindle formation begins.</p></div><div class='step-card'><div class='step-top'><span class='step-index'>02</span><span class='rule'></span></div><h4>Metaphase</h4><p class='subtitle'>Chromosomes align</p><p>Chromosomes line up at the metaphase plate.</p></div><div class='step-card'><div class='step-top'><span class='step-index'>03</span><span class='rule'></span></div><h4>Anaphase</h4><p class='subtitle'>Sister chromatids separate</p><p>Chromatids move toward opposite poles.</p></div><div class='step-card'><div class='step-top'><span class='step-index'>04</span><span class='rule'></span></div><h4>Telophase</h4><p class='subtitle'>Nuclei reform</p><p>Nuclear envelopes reform and chromosomes begin to decondense.</p></div></div>", "reference_title": "Key Concepts", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Mitosis:</strong> Nuclear division that produces genetically similar daughter nuclei.</li><li><strong>Metaphase:</strong> Stage where chromosomes align in the middle.</li><li><strong>Anaphase:</strong> Stage where sister chromatids separate.</li><li><strong>Telophase:</strong> Stage where nuclei reform.</li></ul>", "questions": [{"prompt": "During metaphase, chromosomes:", "options": ["Decondense completely", "Line up at the cell's equator", "Move into separate cells", "Disappear"], "correct": 1, "explanation": "In metaphase, chromosomes line up at the metaphase plate."}, {"prompt": "Sister chromatids separate during:", "options": ["Prophase", "Metaphase", "Anaphase", "Interphase"], "correct": 2, "explanation": "Sister chromatids separate during anaphase."}, {"prompt": "Mitosis is important for:", "options": ["Growth and repair", "Only photosynthesis", "Only respiration", "Only fertilization"], "correct": 0, "explanation": "Mitosis is important for growth and repair."}, {"prompt": "Nuclei begin to reform during:", "options": ["Anaphase", "Telophase", "Metaphase", "Cytoplasm"], "correct": 1, "explanation": "Nuclei begin to reform during telophase."}], "manual_alignment": ["The stage sequence supports slide identification in the manual."], "instructor_notes": ["This will pair well with a future image-based stage identification activity."]}, {"id": 12, "title": "Meiosis / Strawberry DNA Extraction", "hero": "Blueprint support for meiosis and introductory DNA extraction concepts.", "manual_do": ["Compare meiosis to mitosis.", "Observe or discuss stages and chromosome number changes.", "Complete DNA extraction steps and observations.", "Record outcomes and answer analysis questions."], "blueprint_understand": ["Recognize the purpose of meiosis.", "Understand reduction in chromosome number.", "Connect meiosis to genetic variation.", "Relate extraction steps to visible DNA recovery."], "lab_check": ["Differentiate meiosis from mitosis.", "Explain why meiosis matters biologically.", "Connect DNA extraction steps to what students observe."], "study_title": "Meiosis Blueprint", "study_tag": "Process Plate", "study_html": "<div class='compare-grid'><div class='compare-box'><h4>Mitosis</h4><p>One division; growth and repair; maintains chromosome number.</p></div><div class='compare-box'><h4>Meiosis</h4><p>Two divisions; produces gametes; reduces chromosome number.</p></div><div class='compare-box'><h4>Variation</h4><p>Crossing over and independent assortment increase diversity.</p></div><div class='compare-box'><h4>DNA Extraction</h4><p>Students connect visible strands to released cellular DNA.</p></div></div>", "reference_title": "Key Concepts", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Meiosis:</strong> Cell division that reduces chromosome number and produces gametes.</li><li><strong>Genetic variation:</strong> Increased through meiosis.</li><li><strong>DNA extraction:</strong> Makes cellular DNA visible through a simple lab process.</li><li><strong>Gametes:</strong> Haploid sex cells produced by meiosis.</li></ul>", "questions": [{"prompt": "Meiosis is important because it:", "options": ["Produces gametes", "Only repairs tissues", "Only increases cell size", "Only produces ATP"], "correct": 0, "explanation": "Meiosis produces gametes."}, {"prompt": "Compared with mitosis, meiosis:", "options": ["Has fewer stages and no chromosome change", "Reduces chromosome number", "Only happens in bacteria", "Eliminates DNA"], "correct": 1, "explanation": "Meiosis reduces chromosome number."}, {"prompt": "A major outcome of meiosis is:", "options": ["Increased genetic variation", "No genetic differences", "Permanent diploid increase", "No cell division"], "correct": 0, "explanation": "Meiosis contributes to genetic variation."}, {"prompt": "In strawberry DNA extraction, the visible strands represent:", "options": ["ATP", "DNA", "Protein only", "Cell wall"], "correct": 1, "explanation": "The visible strands are DNA released from cells."}], "manual_alignment": ["This supports both meiosis concepts and the DNA extraction activity."], "instructor_notes": ["Later, this could be split into two subpanels if you want meiosis and DNA extraction separated."]}, {"id": 13, "title": "Patterns of Inheritance: Mendelian Genetics", "hero": "Blueprint module for basic Mendelian genetics and Punnett square reasoning.", "manual_do": ["Work through inheritance examples.", "Use Punnett squares or trait comparisons in the manual.", "Record genotype and phenotype outcomes.", "Answer analysis questions tied to inheritance patterns."], "blueprint_understand": ["Differentiate genotype and phenotype.", "Interpret dominant and recessive relationships.", "Use Punnett square logic.", "Connect allele combinations to inheritance patterns."], "lab_check": ["Interpret simple genetic crosses.", "Differentiate genotype and phenotype.", "Recognize dominant and recessive outcomes."], "study_title": "Genetics Blueprint", "study_tag": "Inheritance Plate", "study_html": "<div class='compare-grid'><div class='compare-box'><h4>Genotype</h4><p>Allele combination an organism carries.</p></div><div class='compare-box'><h4>Phenotype</h4><p>Observable trait expressed.</p></div><div class='compare-box'><h4>Dominant</h4><p>Trait expressed when present in a heterozygote.</p></div><div class='compare-box'><h4>Recessive</h4><p>Trait expressed only when two recessive alleles are present.</p></div></div>", "reference_title": "Key Concepts", "reference_tag": "Reference", "reference_html": "<ul class='label-list'><li><strong>Genotype:</strong> Genetic makeup for a trait.</li><li><strong>Phenotype:</strong> Observable expression of a trait.</li><li><strong>Dominant allele:</strong> Expressed in a heterozygous condition.</li><li><strong>Recessive allele:</strong> Expressed only in the homozygous recessive condition.</li><li><strong>Punnett square:</strong> Tool used to predict offspring combinations.</li></ul>", "questions": [{"prompt": "Genotype refers to:", "options": ["Visible appearance only", "The allele combination", "The environment only", "The cell membrane"], "correct": 1, "explanation": "Genotype refers to the allele combination."}, {"prompt": "Phenotype refers to:", "options": ["Only DNA sequence", "The observable trait", "Only the chromosome number", "The pH of a cell"], "correct": 1, "explanation": "Phenotype is the observable expression of a trait."}, {"prompt": "A recessive trait is expressed when:", "options": ["At least one dominant allele is present", "Two recessive alleles are present", "The organism is always heterozygous", "ATP levels are low"], "correct": 1, "explanation": "Recessive traits are expressed when two recessive alleles are present."}, {"prompt": "Punnett squares are used to:", "options": ["Measure mass", "Predict possible offspring allele combinations", "View cells under a microscope", "Change DNA directly"], "correct": 1, "explanation": "Punnett squares help predict possible offspring combinations."}], "manual_alignment": ["This supports interpretation of manual inheritance examples and practice crosses."], "instructor_notes": ["Later, this could expand into interactive Punnett squares."]}];
let selectedLabId=1,answers={},showFeedback=false;
function renderLabList(){const list=document.getElementById('labList');list.innerHTML='';labs.forEach(lab=>{const btn=document.createElement('button');btn.className='lab-tile'+(lab.id===selectedLabId?' selected':'');btn.innerHTML='<span class="lab-title">Lab '+lab.id+': '+lab.title+'</span>';btn.onclick=()=>{selectedLabId=lab.id;answers={};showFeedback=false;render();};list.appendChild(btn);});}
function hero(eyebrow,title,copy,pills){return '<section class="card hero"><div class="blueprint-grid"></div><div class="card-inner"><p class="eyebrow">'+eyebrow+'</p><h2>'+title+'</h2><p class="copy">'+copy+'</p><div class="row">'+pills.map(p=>'<span class="pill">'+p+'</span>').join('')+'</div></div></section>';}
function renderQuestions(questionSet,prefix){const qHtml=questionSet.map((q,i)=>{const selected=answers[i];const options=q.options.map((opt,idx)=>'<label class="option"><input type="radio" name="'+prefix+i+'" '+(selected===idx?'checked':'')+' onchange="selectAnswer('+i+','+idx+')"><span>'+opt+'</span></label>').join('');let feedback='';if(showFeedback&&selected!==undefined){const ok=selected===q.correct;feedback='<div class="feedback '+(ok?'correct':'incorrect')+'">'+(ok?'Correct.':'Not quite.')+' '+q.explanation+'</div>';}return '<div class="question"><p>'+(i+1)+'. '+q.prompt+'</p><div class="options">'+options+'</div>'+feedback+'</div>';}).join('');const score=questionSet.reduce((n,q,i)=>n+(answers[i]===q.correct?1:0),0);const allAnswered=questionSet.every((_,i)=>answers[i]!==undefined);return {qHtml,score,allAnswered};}
function renderLab(lab){const q=renderQuestions(lab.questions,'lab'+lab.id+'q');return hero('Lab '+lab.id,lab.title,lab.hero,['Manual + Blueprint + Lab Check','Built Module'])+'<section class="grid three"><article class="card panel"><h3>Manual → Do</h3><ul>'+lab.manual_do.map(x=>'<li>'+x+'</li>').join('')+'</ul></article><article class="card panel"><h3>Blueprint → Understand</h3><ul>'+lab.blueprint_understand.map(x=>'<li>'+x+'</li>').join('')+'</ul></article><article class="card panel"><h3>Lab Check → Demonstrate</h3><ul>'+lab.lab_check.map(x=>'<li>'+x+'</li>').join('')+'</ul></article></section><section class="grid two"><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">'+lab.study_title+'</h3><span class="tag">'+lab.study_tag+'</span></div>'+lab.study_html+'</article><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">'+lab.reference_title+'</h3><span class="tag">'+lab.reference_tag+'</span></div>'+lab.reference_html+'</article></section><section class="grid two"><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Lab '+lab.id+' Check</h3><span class="tag">Auto-feedback Demo</span></div><div class="step-card" style="margin-bottom:18px;"><h4>Short graded-style check</h4><ol>'+lab.questions.map(item=>'<li>'+item.prompt+'</li>').join('')+'</ol></div><h4>Quick Blueprint Practice</h4>'+q.qHtml+'<div class="controls"><button class="btn" onclick="showAnswers()">Show Feedback</button><button class="btn" onclick="resetQuiz()">Reset</button></div>'+(showFeedback&&q.allAnswered?'<div class="score">Score: '+q.score+' / '+lab.questions.length+'</div>':'')+'</article><article class="card panel"><h3>Manual Alignment</h3><ul>'+lab.manual_alignment.map(x=>'<li>'+x+'</li>').join('')+'</ul><h3 style="margin-top:22px;">Instructor Notes</h3><ul>'+lab.instructor_notes.map(x=>'<li>'+x+'</li>').join('')+'</ul></article></section>';}
function render(){renderLabList();document.getElementById('content').innerHTML=renderLab(labs.find(l=>l.id===selectedLabId));}
function selectAnswer(q,a){answers[q]=a;render();}function showAnswers(){showFeedback=true;render();}function resetQuiz(){answers={};showFeedback=false;render();}
window.selectAnswer=selectAnswer;window.showAnswers=showAnswers;window.resetQuiz=resetQuiz;render();
</script></body></html>
