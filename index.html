<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BIOL 1110 Lab Blueprint</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg1: #082147;
    --bg2: #041225;
    --panel: rgba(8, 29, 58, 0.88);
    --panel-border: rgba(214, 233, 255, 0.18);
    --line: rgba(228, 240, 255, 0.92);
    --muted: #a9bfda;
    --accent: #dff0ff;
    --shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
  }
  html, body {
    margin: 0;
    min-height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--line);
    background:
      linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px),
      linear-gradient(180deg, var(--bg1), var(--bg2) 70%);
    background-size: 24px 24px, 24px 24px, cover;
  }
  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
  .sidebar {
    background: rgba(3,15,31,0.75);
    border-right: 1px solid rgba(223,240,255,0.14);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .eyebrow {
    margin: 0 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.72rem;
    color: var(--muted);
  }
  h1, h2, h3, h4 { margin-top: 0; }
  h1 { font-size: 1.9rem; margin-bottom: 10px; }
  .copy, .muted, li, p { color: var(--muted); line-height: 1.55; }
  .lab-list { display: grid; gap: 10px; margin-top: 18px; }
  .lab-tile {
    text-align: left;
    border: 1px solid rgba(223,240,255,0.12);
    background: rgba(255,255,255,0.03);
    color: var(--line);
    border-radius: 16px;
    padding: 14px;
    display: grid;
    gap: 4px;
    cursor: pointer;
    width: 100%;
  }
  .lab-tile.selected {
    border-color: rgba(223,240,255,0.42);
    background: rgba(223,240,255,0.08);
  }
  .lab-week { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .lab-title { font-size: 0.98rem; font-weight: 600; color: var(--line); }
  .lab-date { font-size: 0.88rem; color: var(--muted); }
  main { padding: 24px; }
  .card {
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .hero { min-height: 220px; }
  .card-inner { position: relative; z-index: 2; padding: 28px; }
  .hero h2 { font-size: clamp(2rem, 4vw, 3.2rem); margin-bottom: 10px; }
  .pill, .tag, .btn {
    display: inline-flex;
    align-items: center;
    border: 1px solid rgba(223,240,255,0.22);
    background: rgba(223,240,255,0.08);
    padding: 8px 12px;
    border-radius: 999px;
    color: var(--accent);
    font-size: 0.86rem;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .grid { display: grid; gap: 18px; margin-bottom: 18px; }
  .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .panel { padding: 22px; }
  ul, ol { padding-left: 20px; margin-bottom: 0; }
  .blueprint-grid {
    position: absolute; inset: 0; z-index: 1; opacity: 0.5;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px, 96px 96px, 96px 96px;
  }
  .step-flow { display: grid; gap: 14px; }
  .step-card, .question, .diagram-box {
    border: 1px solid rgba(223,240,255,0.16);
    border-radius: 18px;
    padding: 16px;
    background: rgba(255,255,255,0.025);
  }
  .step-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .step-index { font-size: 0.8rem; letter-spacing: 0.12em; color: var(--accent); }
  .rule { height: 1px; background: rgba(223,240,255,0.18); flex: 1; }
  .subtitle { color: var(--accent); font-size: 0.92rem; margin: 0 0 8px; }
  .question p:first-child { color: var(--accent); font-weight: 700; }
  .options { display: grid; gap: 8px; }
  .option { display: flex; gap: 10px; align-items: flex-start; }
  .feedback { margin-top: 12px; padding: 12px 14px; border-radius: 14px; font-size: 0.95rem; }
  .correct { background: rgba(107,255,175,0.08); border: 1px solid rgba(107,255,175,0.16); }
  .incorrect { background: rgba(255,169,169,0.08); border: 1px solid rgba(255,169,169,0.16); }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  button.btn { cursor: pointer; color: var(--line); }
  .score {
    margin-top: 12px; display: inline-flex; padding: 12px 14px; border-radius: 14px;
    background: rgba(223,240,255,0.08); border: 1px solid rgba(223,240,255,0.18);
    color: var(--accent); font-weight: 600;
  }
  .microscope-svg, .cell-svg {
    width: 100%; max-width: 520px; height: auto; display: block; margin: 0 auto;
  }
  .label-list { columns: 2; gap: 24px; }
  .label-list li { break-inside: avoid; margin-bottom: 8px; }
  .small-note { font-size: 0.9rem; }
  .compare-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .compare-box {
    border: 1px solid rgba(223,240,255,0.16);
    border-radius: 18px;
    padding: 14px;
    background: rgba(255,255,255,0.025);
  }
  @media (max-width: 1100px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid rgba(223,240,255,0.14); }
    .grid.two, .grid.three, .compare-grid { grid-template-columns: 1fr; }
    .label-list { columns: 1; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <p class="eyebrow">Spring 2026</p>
      <h1>BIOL 1110 Lab Blueprint</h1>
      <p class="copy">Manual-driven lab companion with blueprint-style concept support and short lab checks.</p>
      <div id="labList" class="lab-list"></div>
    </aside>
    <main><div id="content"></div></main>
  </div>

  <script>
    const labs = [
      { week: 1, labNumber: null, title: "No Lab", dates: "Jan. 19", material: "MLK Holiday, No Lab", status: "break" },
      { week: 2, labNumber: 1, title: "Introduction to Course Syllabus & Lab Safety", dates: "Jan. 26", material: "Introduction to Course Syllabus & Lab Safety, McGraw Hill Connect Set-up", status: "placeholder" },
      { week: 3, labNumber: 2, title: "Scientific Method", dates: "Feb. 2", material: "Scientific Method and Supplement", status: "active" },
      { week: 4, labNumber: 3, title: "Understanding Biochemical Tests", dates: "Feb. 9", material: "pH, Acids, Bases, and Buffers Supplement", status: "placeholder" },
      { week: 5, labNumber: 4, title: "Microscopy", dates: "Feb. 16", material: "Microscopy only", status: "active" },
      { week: 6, labNumber: 5, title: "Chemical Composition of Cells", dates: "Feb. 23", material: "Chemical Composition of Cells: Proteins, Carbohydrates and Lipids", status: "placeholder" },
      { week: 7, labNumber: 6, title: "Cell Structure and Function", dates: "Mar. 2", material: "Cell Structure and Function", status: "active" },
      { week: 8, labNumber: null, title: "No Lab", dates: "Mar. 9", material: "Spring Break, No Labs Meet", status: "break" },
      { week: 9, labNumber: 7, title: "Diffusion and Osmosis", dates: "Mar. 16", material: "Diffusion and Osmosis", status: "placeholder" },
      { week: 10, labNumber: null, title: "No Lab", dates: "Mar. 23", material: "Academic Festival Week, No Labs Meet", status: "break" },
      { week: 11, labNumber: 8, title: "How Enzymes Function", dates: "Mar. 30", material: "How Enzymes Function", status: "placeholder" },
      { week: 12, labNumber: 9, title: "Aerobic Cellular Respiration", dates: "Apr. 6", material: "Aerobic Cellular Respiration", status: "placeholder" },
      { week: 13, labNumber: 10, title: "Photosynthesis", dates: "Apr. 13", material: "Photosynthesis", status: "placeholder" },
      { week: 14, labNumber: 11, title: "Mitosis", dates: "Apr. 20", material: "Mitosis", status: "placeholder" },
      { week: 15, labNumber: 12, title: "Meiosis / Strawberry DNA Extraction", dates: "Apr. 27", material: "Meiosis / Strawberry DNA Extraction", status: "placeholder" },
      { week: 16, labNumber: 13, title: "Patterns of Inheritance: Mendelian Genetics", dates: "May 4", material: "Patterns of Inheritance: Mendelian Genetics", status: "placeholder" }
    ];

    const lab2Steps = [
      ["Observation", "What students do in the manual", "Observe pillbug movement and behavior before testing anything."],
      ["Measurement", "Collect basic data", "Measure the speed of three pillbugs and calculate average speed in cm/sec."],
      ["Hypothesis", "Predict the outcome", "Choose dry and wet substances, include controls, and predict +, −, or 0."],
      ["Experiment", "Test one substance at a time", "Rinse and dry the pillbug between trials, then record each response carefully."],
      ["Conclusion", "Interpret the results", "Decide whether the hypothesis was supported and explain how controls affect the conclusion."]
    ];

    const lab2Questions = [
      { prompt: "What is the main role of a control in the pillbug experiment?", options: ["To make the pillbug move faster", "To provide a comparison so the tested substance can be evaluated", "To guarantee the hypothesis is correct", "To replace the need for repeated trials"], correct: 1, explanation: "A control provides a baseline for comparison so students can judge whether the pillbug responded differently to a tested substance." },
      { prompt: "In this lab, the substance being tested is the:", options: ["Dependent variable", "Control variable", "Independent variable", "Conclusion"], correct: 2, explanation: "The independent variable is the factor being changed or tested." },
      { prompt: "The pillbug's observed response (+, −, or 0) is the:", options: ["Dependent variable", "Independent variable", "Theory", "Control"], correct: 0, explanation: "The response is the measured result, so it is the dependent variable." }
    ];

    const lab4Questions = [
      { prompt: "What is the total magnification when using a 10x ocular lens and a 40x objective lens?", options: ["40x", "100x", "400x", "1000x"], correct: 2, explanation: "Total magnification is ocular magnification multiplied by objective magnification: 10 × 40 = 400." },
      { prompt: "Which knob should be used first to bring a specimen into general focus on low power?", options: ["Fine adjustment knob", "Coarse adjustment knob", "Diaphragm lever", "Revolving nosepiece"], correct: 1, explanation: "The coarse adjustment knob is used first on low power to bring the specimen into general focus." },
      { prompt: "Why should only the fine adjustment knob be used on high power?", options: ["It increases the brightness", "It changes the slide orientation", "It reduces the risk of crashing the objective into the slide", "It changes the total magnification"], correct: 2, explanation: "The fine adjustment knob allows small focus changes and helps prevent damage to the slide or objective lens." },
      { prompt: "What is the main function of the diaphragm?", options: ["To rotate objectives", "To control the amount of light passing through the specimen", "To move the stage up and down", "To change the magnification"], correct: 1, explanation: "The diaphragm regulates how much light reaches the specimen." }
    ];

    const lab6Questions = [
      { prompt: "Which structure is found in plant cells but not animal cells?", options: ["Mitochondrion", "Cell wall", "Cell membrane", "Ribosome"], correct: 1, explanation: "Plant cells have a cell wall, while animal cells do not." },
      { prompt: "What is the main function of the nucleus?", options: ["Produce ATP", "Store genetic information and direct cell activities", "Digest worn-out organelles", "Control water loss"], correct: 1, explanation: "The nucleus houses DNA and helps direct cell activities." },
      { prompt: "Which organelle is the primary site of ATP production?", options: ["Golgi apparatus", "Central vacuole", "Mitochondrion", "Lysosome"], correct: 2, explanation: "Mitochondria are the main organelles responsible for ATP production in eukaryotic cells." },
      { prompt: "What is the key function of the cell membrane?", options: ["Provide rigid structural support like a cell wall", "Control what enters and leaves the cell", "Store genetic material", "Produce proteins"], correct: 1, explanation: "The cell membrane is selectively permeable and regulates movement into and out of the cell." }
    ];

    let selectedWeek = 7;
    let answers = {};
    let showFeedback = false;

    function renderLabList() {
      const list = document.getElementById("labList");
      list.innerHTML = "";
      labs.forEach(lab => {
        const btn = document.createElement("button");
        btn.className = "lab-tile" + (lab.week === selectedWeek ? " selected" : "");
        btn.innerHTML = '<span class="lab-week">Week ' + lab.week + '</span><span class="lab-title">' + (lab.labNumber ? ('Lab ' + lab.labNumber + ': ' + lab.title) : lab.title) + '</span><span class="lab-date">' + lab.dates + '</span>';
        btn.onclick = () => {
          selectedWeek = lab.week;
          answers = {};
          showFeedback = false;
          render();
        };
        list.appendChild(btn);
      });
    }

    function hero(eyebrow, title, copy, pills) {
      return '<section class="card hero"><div class="blueprint-grid"></div><div class="card-inner"><p class="eyebrow">' + eyebrow + '</p><h2>' + title + '</h2><p class="copy">' + copy + '</p><div class="row">' + pills.map(p => '<span class="pill">' + p + '</span>').join("") + '</div></div></section>';
    }

    function renderPlaceholder(lab) {
      return hero('Lab ' + lab.labNumber, lab.title, lab.material, ['Placeholder Module']) +
      '<section class="grid two"><article class="card panel"><h3>Planned Layout</h3><ul><li>Main blueprint study plate for the lab’s central concept</li><li>2–3 inset views or mini studies</li><li>Short concept notes tied to the purchased manual</li><li>Quick self-check items for in-class use</li></ul></article><article class="card panel"><h3>Integration Plan</h3><ul><li>Manual = what students do</li><li>Blueprint = what students understand</li><li>Lab Check = what gets graded</li></ul></article></section>';
    }

    function renderBreak(lab) {
      return hero('Week ' + lab.week, lab.title, lab.material, ['No Module Needed']);
    }

    function renderQuestions(questionSet, keyPrefix) {
      const qHtml = questionSet.map((q, i) => {
        const selected = answers[i];
        const options = q.options.map((opt, idx) =>
          '<label class="option"><input type="radio" name="' + keyPrefix + i + '" ' +
          (selected === idx ? 'checked' : '') +
          ' onchange="selectAnswer(' + i + ',' + idx + ')"><span>' + opt + '</span></label>'
        ).join("");
        let feedback = "";
        if (showFeedback && selected !== undefined) {
          const ok = selected === q.correct;
          feedback = '<div class="feedback ' + (ok ? 'correct' : 'incorrect') + '">' + (ok ? 'Correct.' : 'Not quite.') + ' ' + q.explanation + '</div>';
        }
        return '<div class="question"><p>' + (i + 1) + '. ' + q.prompt + '</p><div class="options">' + options + '</div>' + feedback + '</div>';
      }).join("");
      const score = questionSet.reduce((n, q, i) => n + (answers[i] === q.correct ? 1 : 0), 0);
      const allAnswered = questionSet.every((_, i) => answers[i] !== undefined);
      return { qHtml, score, allAnswered };
    }

    function microscopeSVG() {
      return `
      <svg class="microscope-svg" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Microscope blueprint diagram">
        <g stroke="#E4F0FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="145" y="432" width="230" height="24" rx="4"/>
          <path d="M205 432L240 380H330L355 432"/>
          <rect x="230" y="290" width="120" height="18" rx="3"/>
          <path d="M290 308V380"/>
          <path d="M210 365C210 310 240 250 300 220"/>
          <path d="M235 352C235 308 258 268 305 242"/>
          <circle cx="214" cy="333" r="26"/>
          <circle cx="214" cy="333" r="10"/>
          <circle cx="248" cy="286" r="12"/>
          <path d="M300 220L344 160"/>
          <rect x="334" y="112" width="24" height="70" rx="4" transform="rotate(18 334 112)"/>
          <circle cx="306" cy="226" r="20"/>
          <path d="M306 246L290 290"/>
          <path d="M306 246L312 290"/>
          <path d="M306 246L334 286"/>
          <path d="M350 293V344"/>
          <path d="M372 278L372 359"/>
          <path d="M230 299L196 299"/>
          <path d="M360 299L402 299"/>
        </g>
        <g fill="#E4F0FF" font-family="Arial, Helvetica, sans-serif" font-size="12">
          <text x="366" y="108">Eyepiece</text>
          <text x="354" y="192">Body Tube</text>
          <text x="334" y="218">Revolving</text>
          <text x="334" y="232">Nosepiece</text>
          <text x="360" y="286">Objectives</text>
          <text x="196" y="276">Stage</text>
          <text x="140" y="325">Coarse</text>
          <text x="140" y="339">Focus</text>
          <text x="182" y="280">Fine Focus</text>
          <text x="250" y="398">Arm</text>
          <text x="245" y="451">Base</text>
        </g>
      </svg>`;
    }

    function cellSVG() {
      return `
      <svg class="cell-svg" viewBox="0 0 620 360" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Plant and animal cell blueprint diagram">
        <g stroke="#E4F0FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="36" y="36" width="244" height="244" rx="18"/>
          <rect x="54" y="54" width="208" height="208" rx="28"/>
          <circle cx="142" cy="132" r="34"/>
          <ellipse cx="212" cy="126" rx="24" ry="16"/>
          <ellipse cx="98" cy="208" rx="28" ry="16"/>
          <rect x="160" y="180" width="64" height="46" rx="6"/>
          <ellipse cx="222" cy="214" rx="16" ry="10"/>
          <path d="M84 88H116"/>
          <path d="M194 92H228"/>
          <path d="M92 242H140"/>
          <path d="M182 248H236"/>
          <ellipse cx="462" cy="158" rx="118" ry="92"/>
          <ellipse cx="462" cy="158" rx="100" ry="76"/>
          <circle cx="426" cy="134" r="32"/>
          <ellipse cx="512" cy="132" rx="22" ry="15"/>
          <ellipse cx="506" cy="200" rx="26" ry="16"/>
          <ellipse cx="406" cy="206" rx="22" ry="14"/>
          <path d="M370 106H392"/>
          <path d="M524 100H548"/>
          <path d="M548 208H572"/>
          <path d="M350 220H378"/>
        </g>
        <g fill="#E4F0FF" font-family="Arial, Helvetica, sans-serif" font-size="12">
          <text x="88" y="24">Plant Cell Study</text>
          <text x="406" y="24">Animal Cell Study</text>
          <text x="120" y="136">Nucleus</text>
          <text x="170" y="174">Central</text>
          <text x="170" y="188">Vacuole</text>
          <text x="62" y="74">Cell Wall</text>
          <text x="70" y="98">Cell Membrane</text>
          <text x="204" y="118">Chloroplast</text>
          <text x="72" y="228">Mitochondrion</text>
          <text x="228" y="228">Golgi</text>
          <text x="404" y="138">Nucleus</text>
          <text x="500" y="128">Mitochondrion</text>
          <text x="496" y="222">Golgi</text>
          <text x="382" y="226">Lysosome</text>
          <text x="356" y="98">Cell Membrane</text>
        </g>
      </svg>`;
    }

    function renderLab2() {
      const r = renderQuestions(lab2Questions, "lab2q");
      return hero('Lab 2 · Week 3', 'Scientific Method', 'Pillbug behavior lab companion that ties the purchased lab manual to a blueprint-style concept review.', ['Manual + Blueprint + Lab Check', 'Active module']) +
      '<section class="grid three"><article class="card panel"><h3>Manual → Do</h3><ul><li>Observe pillbug motion and behavior.</li><li>Measure speed for three pillbugs.</li><li>Record hypotheses in Tables 1.2 and 1.3.</li><li>Complete conclusion and review questions.</li></ul></article><article class="card panel"><h3>Blueprint → Understand</h3><ul><li>Identify independent and dependent variables.</li><li>Explain the role of controls.</li><li>Interpret attraction, repulsion, or no response.</li><li>Connect data to hypothesis and conclusion.</li></ul></article><article class="card panel"><h3>Lab Check → Demonstrate</h3><ul><li>Define hypothesis vs. conclusion.</li><li>Identify the control and explain why it matters.</li><li>State independent and dependent variables.</li><li>Use observations to explain one response.</li></ul></article></section>' +
      '<section class="grid two"><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Scientific Method Blueprint</h3><span class="tag">Study Plate</span></div><div class="step-flow">' +
      lab2Steps.map((s, idx) => '<div class="step-card"><div class="step-top"><span class="step-index">0' + (idx + 1) + '</span><span class="rule"></span></div><h4>' + s[0] + '</h4><p class="subtitle">' + s[1] + '</p><p>' + s[2] + '</p></div>').join("") +
      '</div></article><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Lab 2 Check</h3><span class="tag">Auto-feedback Demo</span></div><div class="step-card" style="margin-bottom:18px;"><h4>Short graded-style check</h4><ol><li>What is a hypothesis, and how is it different from a conclusion?</li><li>What was the control in your pillbug experiment, and why is it important?</li><li>What were the independent and dependent variables?</li><li>Based on your observations, did the pillbug show attraction, repulsion, or no response to one substance?</li></ol></div><h4>Quick Blueprint Practice</h4>' +
      r.qHtml +
      '<div class="controls"><button class="btn" onclick="showAnswers()">Show Feedback</button><button class="btn" onclick="resetQuiz()">Reset</button></div>' +
      (showFeedback && r.allAnswered ? '<div class="score">Score: ' + r.score + ' / ' + lab2Questions.length + '</div>' : '') +
      '</article></section>';
    }

    function renderLab4() {
      const r = renderQuestions(lab4Questions, "lab4q");
      return hero('Lab 4 · Week 5', 'Microscopy', 'Blueprint-style microscope module that supports in-class manual work, structure identification, and microscopy check questions.', ['Manual + Blueprint + Lab Check', 'Active module']) +
      '<section class="grid three"><article class="card panel"><h3>Manual → Do</h3><ul><li>Identify microscope parts.</li><li>Practice carrying, focusing, and slide placement.</li><li>Move from scanning or low power to higher magnification.</li><li>Record observations using the lab manual.</li></ul></article><article class="card panel"><h3>Blueprint → Understand</h3><ul><li>Learn the function of each microscope part.</li><li>Connect objective changes to total magnification.</li><li>Understand when to use coarse vs. fine focus.</li><li>Recognize how light and diaphragm settings affect the image.</li></ul></article><article class="card panel"><h3>Lab Check → Demonstrate</h3><ul><li>Calculate total magnification.</li><li>Identify the correct focusing knob for a situation.</li><li>Explain the role of the diaphragm.</li><li>Show readiness for microscope-based lab tests.</li></ul></article></section>' +
      '<section class="grid two"><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Microscope Blueprint Study</h3><span class="tag">Structure Plate</span></div><div class="diagram-box">' + microscopeSVG() + '</div><p class="small-note">This module is meant to sit beside the lab manual. Students use the manual for procedure and notes, then use this blueprint plate to connect part names to function.</p></article>' +
      '<article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Key Parts and Functions</h3><span class="tag">Reference</span></div><ul class="label-list"><li><strong>Eyepiece (ocular):</strong> The lens students look through, commonly 10x.</li><li><strong>Body tube:</strong> Holds the optical path between ocular and objectives.</li><li><strong>Revolving nosepiece:</strong> Rotates to change objective lenses.</li><li><strong>Objective lenses:</strong> Provide different magnification levels.</li><li><strong>Stage:</strong> Supports the slide.</li><li><strong>Coarse adjustment:</strong> Used first on low power for general focus.</li><li><strong>Fine adjustment:</strong> Used for precise focus, especially on higher power.</li><li><strong>Diaphragm:</strong> Controls light passing through the specimen.</li><li><strong>Arm:</strong> Supports the upper microscope structure.</li><li><strong>Base:</strong> Stabilizes the instrument.</li></ul></article></section>' +
      '<section class="grid two"><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Lab 4 Check</h3><span class="tag">Auto-feedback Demo</span></div><div class="step-card" style="margin-bottom:18px;"><h4>Short graded-style check</h4><ol><li>What is the total magnification when using a 10x ocular lens and a 40x objective lens?</li><li>Which knob should be used first on low power, and why?</li><li>Why should only the fine adjustment knob be used on high power?</li><li>What is the function of the diaphragm?</li></ol></div><h4>Quick Blueprint Practice</h4>' +
      r.qHtml +
      '<div class="controls"><button class="btn" onclick="showAnswers()">Show Feedback</button><button class="btn" onclick="resetQuiz()">Reset</button></div>' +
      (showFeedback && r.allAnswered ? '<div class="score">Score: ' + r.score + ' / ' + lab4Questions.length + '</div>' : '') +
      '</article><article class="card panel"><h3>Manual Alignment</h3><ul><li>Microscope parts and handling tie directly to the labeled blueprint diagram.</li><li>Any magnification section in the manual links to the Lab 4 total magnification check.</li><li>Focusing technique in the manual connects to coarse vs. fine adjustment questions.</li><li>Light control and image clarity connect to the diaphragm question.</li></ul><h3 style="margin-top:22px;">Instructor Notes</h3><ul><li>This module is a strong fit for in-class use because students can reference it while physically using microscopes.</li><li>Later, you can turn the diagram into a click-to-label exercise.</li><li>This one is also easy to align with lab practical or lab test questions.</li></ul></article></section>';
    }

    function renderLab6() {
      const r = renderQuestions(lab6Questions, "lab6q");
      return hero('Lab 6 · Week 7', 'Cell Structure and Function', 'Blueprint-style cell module for comparing plant and animal cells, linking organelle structure to function, and reinforcing manual observations.', ['Manual + Blueprint + Lab Check', 'Active module']) +
      '<section class="grid three"><article class="card panel"><h3>Manual → Do</h3><ul><li>Observe prepared slides or diagrams of plant and animal cells.</li><li>Identify major cell structures in the manual.</li><li>Record observations and comparisons.</li><li>Use evidence from the lab to describe cell function.</li></ul></article><article class="card panel"><h3>Blueprint → Understand</h3><ul><li>Connect organelle names to their functions.</li><li>Compare plant and animal cell structures.</li><li>Recognize what all cells share versus what is unique.</li><li>Reinforce vocabulary needed for lab tests.</li></ul></article><article class="card panel"><h3>Lab Check → Demonstrate</h3><ul><li>Identify plant-only versus shared structures.</li><li>Explain major organelle functions.</li><li>Compare plant and animal cells clearly.</li><li>Show readiness for cell structure test questions.</li></ul></article></section>' +
      '<section class="grid two"><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Cell Blueprint Study</h3><span class="tag">Comparison Plate</span></div><div class="diagram-box">' + cellSVG() + '</div><p class="small-note">This plate gives students a quick side-by-side comparison while they work through the manual. It is especially useful when students need help separating shared structures from plant-only structures.</p></article>' +
      '<article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Compare the Cells</h3><span class="tag">Reference</span></div><div class="compare-grid"><div class="compare-box"><h4>Plant Cell</h4><ul><li>Cell wall</li><li>Cell membrane</li><li>Nucleus</li><li>Chloroplasts</li><li>Large central vacuole</li><li>Mitochondria</li></ul></div><div class="compare-box"><h4>Animal Cell</h4><ul><li>Cell membrane</li><li>Nucleus</li><li>Mitochondria</li><li>Golgi apparatus</li><li>Lysosomes</li><li>No cell wall or chloroplasts</li></ul></div></div><h3 style="margin-top:22px;">Organelle Function Highlights</h3><ul class="label-list"><li><strong>Nucleus:</strong> Stores DNA and directs cell activities.</li><li><strong>Cell membrane:</strong> Controls what enters and leaves the cell.</li><li><strong>Cell wall:</strong> Provides support and protection in plant cells.</li><li><strong>Chloroplast:</strong> Site of photosynthesis in plant cells.</li><li><strong>Central vacuole:</strong> Stores water and helps maintain plant cell rigidity.</li><li><strong>Mitochondrion:</strong> Produces ATP through cellular respiration.</li><li><strong>Golgi apparatus:</strong> Modifies and packages materials.</li><li><strong>Lysosome:</strong> Breaks down waste and worn-out components.</li></ul></article></section>' +
      '<section class="grid two"><article class="card panel"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">Lab 6 Check</h3><span class="tag">Auto-feedback Demo</span></div><div class="step-card" style="margin-bottom:18px;"><h4>Short graded-style check</h4><ol><li>Which structure is present in plant cells but not animal cells?</li><li>What is the main function of the nucleus?</li><li>Which organelle is the main site of ATP production?</li><li>What is the function of the cell membrane?</li></ol></div><h4>Quick Blueprint Practice</h4>' +
      r.qHtml +
      '<div class="controls"><button class="btn" onclick="showAnswers()">Show Feedback</button><button class="btn" onclick="resetQuiz()">Reset</button></div>' +
      (showFeedback && r.allAnswered ? '<div class="score">Score: ' + r.score + ' / ' + lab6Questions.length + '</div>' : '') +
      '</article><article class="card panel"><h3>Manual Alignment</h3><ul><li>Plant and animal cell observations link directly to the comparison plate.</li><li>Any organelle labeling in the manual connects to the organelle function list.</li><li>Cell structure vocabulary is reinforced through the quick check.</li><li>This module helps students connect visual structures to biological roles.</li></ul><h3 style="margin-top:22px;">Instructor Notes</h3><ul><li>This is a strong follow-up to microscopy because students move from how to view cells to what they are seeing.</li><li>Later, this can be upgraded into a click-to-label plant and animal cell exercise.</li><li>It will also support later labs involving diffusion, respiration, and photosynthesis.</li></ul></article></section>';
    }

    function render() {
      renderLabList();
      const lab = labs.find(l => l.week === selectedWeek);
      const content = document.getElementById("content");
      if (lab.status === "break") content.innerHTML = renderBreak(lab);
      else if (lab.labNumber === 2) content.innerHTML = renderLab2();
      else if (lab.labNumber === 4) content.innerHTML = renderLab4();
      else if (lab.labNumber === 6) content.innerHTML = renderLab6();
      else content.innerHTML = renderPlaceholder(lab);
    }

    function selectAnswer(q, a) { answers[q] = a; render(); }
    function showAnswers() { showFeedback = true; render(); }
    function resetQuiz() { answers = {}; showFeedback = false; render(); }
    window.selectAnswer = selectAnswer;
    window.showAnswers = showAnswers;
    window.resetQuiz = resetQuiz;
    render();
  </script>
</body>
</html>
